name: SonarCloud Scan

on:
  push:
    branches:
      - main          # or your default branch
  pull_request:
    branches:
      - main          # runs on PRs targeting main

jobs:
  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        
      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v2.4.0 # Use the official action
        with:
          # projectKey and organization are typically set in the SonarCloud UI tutorial
          # or a sonar-project.properties file
          args: >
            -Dsonar.projectKey=callmekaran_Terraform
            -Dsonar.organization=callmekaran
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
